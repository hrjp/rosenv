name: Docker image smoke test
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ros_melodic
          - ros_noetic
          - ros2_foxy
          - ros2_humble
          - ros2_jazzy
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Set test config
        id: config
        run: |
          set -euo pipefail
          case "${{ matrix.image }}" in
            ros_melodic)
              echo "base_image=ubuntu:18.04" >> "$GITHUB_OUTPUT"
              echo "workspace=/home/catkin_ws" >> "$GITHUB_OUTPUT"
              echo "source_setup=source /opt/ros/melodic/setup.bash && source /home/catkin_ws/devel/setup.bash" >> "$GITHUB_OUTPUT"
              echo "build_cmd=cd /home/catkin_ws && catkin build --no-status" >> "$GITHUB_OUTPUT"
              echo "sample_cmd=rosrun turtlesim turtlesim_node" >> "$GITHUB_OUTPUT"
              ;;
            ros_noetic)
              echo "base_image=ubuntu:20.04" >> "$GITHUB_OUTPUT"
              echo "workspace=/home/catkin_ws" >> "$GITHUB_OUTPUT"
              echo "source_setup=source /opt/ros/noetic/setup.bash && source /home/catkin_ws/devel/setup.bash" >> "$GITHUB_OUTPUT"
              echo "build_cmd=rm -rf /home/catkin_ws/build /home/catkin_ws/devel && cd /home/catkin_ws && catkin_make" >> "$GITHUB_OUTPUT"
              echo "sample_cmd=rosrun turtlesim turtlesim_node" >> "$GITHUB_OUTPUT"
              ;;
            ros2_foxy)
              echo "base_image=ubuntu:20.04" >> "$GITHUB_OUTPUT"
              echo "workspace=/home/colcon_ws" >> "$GITHUB_OUTPUT"
              echo "source_setup=source /opt/ros/foxy/setup.bash && source /home/colcon_ws/install/setup.bash" >> "$GITHUB_OUTPUT"
              echo "build_cmd=cd /home/colcon_ws && colcon build --symlink-install --event-handlers console_direct+" >> "$GITHUB_OUTPUT"
              echo "sample_cmd=ros2 run turtlesim turtlesim_node" >> "$GITHUB_OUTPUT"
              ;;
            ros2_humble)
              echo "base_image=ubuntu:22.04" >> "$GITHUB_OUTPUT"
              echo "workspace=/home/colcon_ws" >> "$GITHUB_OUTPUT"
              echo "source_setup=source /opt/ros/humble/setup.bash && source /home/colcon_ws/install/setup.bash" >> "$GITHUB_OUTPUT"
              echo "build_cmd=cd /home/colcon_ws && colcon build --symlink-install --event-handlers console_direct+" >> "$GITHUB_OUTPUT"
              echo "sample_cmd=ros2 run turtlesim turtlesim_node" >> "$GITHUB_OUTPUT"
              ;;
            ros2_jazzy)
              echo "base_image=ubuntu:24.04" >> "$GITHUB_OUTPUT"
              echo "workspace=/home/colcon_ws" >> "$GITHUB_OUTPUT"
              echo "source_setup=source /opt/ros/jazzy/setup.bash && source /home/colcon_ws/install/setup.bash" >> "$GITHUB_OUTPUT"
              echo "build_cmd=cd /home/colcon_ws && colcon build --symlink-install --event-handlers console_direct+" >> "$GITHUB_OUTPUT"
              echo "sample_cmd=ros2 run turtlesim turtlesim_node" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported image: ${{ matrix.image }}" >&2
              exit 1
              ;;
          esac

      - name: Build docker image
        run: |
          set -euo pipefail
          docker build \
            --target final \
            --build-arg BASE_IMAGE="${{ steps.config.outputs.base_image }}" \
            --tag "rosenv-smoke:${{ matrix.image }}" \
            "./docker/${{ matrix.image }}"

      - name: Verify ROS workspace build in container
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash "rosenv-smoke:${{ matrix.image }}" -lc \
            "set -eo pipefail; ${{ steps.config.outputs.source_setup }}; ${{ steps.config.outputs.build_cmd }}"

      - name: Verify GUI sample package (Xvfb)
        run: |
          set -euo pipefail
          sudo Xvfb :99 -screen 0 1280x1024x24 -ac >/tmp/xvfb.log 2>&1 &
          for _ in $(seq 1 20); do
            if [ -S /tmp/.X11-unix/X99 ]; then
              break
            fi
            sleep 0.5
          done
          if [ ! -S /tmp/.X11-unix/X99 ]; then
            echo "Xvfb did not start" >&2
            cat /tmp/xvfb.log || true
            exit 1
          fi

          status=0
          # turtlesim runs continuously, so inner timeout(20s)=success for this smoke test.
          # Outer timeout(60s) remains a hard failure to catch docker run hangs.
          timeout 60s docker run --rm \
            -e DISPLAY=:99 \
            -e QT_X11_NO_MITSHM=1 \
            -e LIBGL_ALWAYS_SOFTWARE=1 \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            --entrypoint /bin/bash "rosenv-smoke:${{ matrix.image }}" -lc \
            "set -eo pipefail; ${{ steps.config.outputs.source_setup }}; status=0; timeout 20s ${{ steps.config.outputs.sample_cmd }} || status=\$?; if [ \"\$status\" -eq 124 ]; then exit 0; fi; exit \"\$status\"" || status=$?

          if [ "$status" -ne 0 ]; then
            echo "GUI smoke test failed with status $status" >&2
            exit "$status"
          fi
